<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptForge Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="options-wrap">
      <section class="settings-hero">
        <span class="preview-pill">v4 settings</span>
        <h1>Tinh chỉnh hành vi mặc định cho PromptForge Dev.</h1>
        <p>
          Trang này điều khiển target model, ngôn ngữ mặc định, default mode, autosave và chất giọng của prompt.
          Workspace presets vẫn được tạo và dùng trực tiếp trong side panel.
        </p>
      </section>

      <section class="settings-card">
        <div class="mini-grid two-col">
          <label>
            <span>Tên / studio</span>
            <input id="ownerName" type="text" placeholder="Ví dụ: koiq Studio" />
          </label>
          <label>
            <span>Brand tone</span>
            <input id="brandTone" type="text" placeholder="Dark, technical, focused, confident" />
          </label>
        </div>

        <div class="mini-grid two-col">
          <label>
            <span>Default language</span>
            <div class="custom-select" data-input="defaultLanguage">
              <button type="button" class="custom-select-trigger"><span data-label>English</span><span class="caret">▾</span></button>
              <div class="custom-select-menu">
                <button type="button" class="custom-option" data-value="English">English</button>
                <button type="button" class="custom-option" data-value="Vietnamese">Vietnamese</button>
                <button type="button" class="custom-option" data-value="Bilingual">Bilingual</button>
              </div>
              <input id="defaultLanguage" type="hidden" value="English" />
            </div>
          </label>
          <label>
            <span>Default mode</span>
            <div class="custom-select" data-input="defaultMode">
              <button type="button" class="custom-select-trigger"><span data-label>Code Review</span><span class="caret">▾</span></button>
              <div class="custom-select-menu">
                <button type="button" class="custom-option" data-value="Code Review">Code Review</button>
                <button type="button" class="custom-option" data-value="Bug Investigation">Bug Investigation</button>
                <button type="button" class="custom-option" data-value="Refactor Planner">Refactor Planner</button>
                <button type="button" class="custom-option" data-value="API Design">API Design</button>
                <button type="button" class="custom-option" data-value="Test Generation">Test Generation</button>
                <button type="button" class="custom-option" data-value="Architecture Breakdown">Architecture Breakdown</button>
              </div>
              <input id="defaultMode" type="hidden" value="Code Review" />
            </div>
          </label>
        </div>

        <div class="mini-grid two-col">
          <label>
            <span>Target model</span>
            <div class="custom-select" data-input="targetModel">
              <button type="button" class="custom-select-trigger"><span data-label>ChatGPT / Claude</span><span class="caret">▾</span></button>
              <div class="custom-select-menu">
                <button type="button" class="custom-option" data-value="ChatGPT / Claude">ChatGPT / Claude</button>
                <button type="button" class="custom-option" data-value="ChatGPT">ChatGPT</button>
                <button type="button" class="custom-option" data-value="Claude">Claude</button>
                <button type="button" class="custom-option" data-value="Gemini">Gemini</button>
              </div>
              <input id="targetModel" type="hidden" value="ChatGPT / Claude" />
            </div>
          </label>
          <label>
            <span>Autosave</span>
            <div class="custom-select" data-input="autosaveEnabled">
              <button type="button" class="custom-select-trigger"><span data-label>Enabled</span><span class="caret">▾</span></button>
              <div class="custom-select-menu">
                <button type="button" class="custom-option" data-value="Enabled">Enabled</button>
                <button type="button" class="custom-option" data-value="Disabled">Disabled</button>
              </div>
              <input id="autosaveEnabled" type="hidden" value="Enabled" />
            </div>
          </label>
        </div>

        <div class="mini-grid two-col">
          <label>
            <span>Autosave delay (ms)</span>
            <input id="autosaveDelay" type="number" min="300" step="100" placeholder="900" />
          </label>
          <label>
            <span>Preferred stack</span>
            <textarea id="preferredStack" rows="3" placeholder="React, Next.js, TypeScript, Node.js, PostgreSQL"></textarea>
          </label>
        </div>

        <label>
          <span>Review rules</span>
          <textarea id="reviewRules" rows="5" placeholder="Explain root cause first. Prefer smallest reliable fix. Preserve coding style. Mention tests."></textarea>
        </label>

        <label>
          <span>Output preference</span>
          <textarea id="outputPreference" rows="4" placeholder="Root cause, Fix summary, Updated code, Tests"></textarea>
        </label>

        <label>
          <span>Signature instructions</span>
          <textarea id="signatureInstructions" rows="4" placeholder="Be practical, senior-level, low fluff, implementation-aware."></textarea>
        </label>

        <div class="button-row">
          <button id="saveProfileBtn" class="primary-btn">Lưu cấu hình</button>
          <button id="resetProfileBtn" class="secondary-btn">Khôi phục mặc định</button>
          <span id="saveStatus" class="inline-note">Chưa lưu thay đổi</span>
        </div>
      </section>
    </div>

    <script src="prompt-engine.js"></script>
    <script src="options.js"></script>
  </body>
</html>
